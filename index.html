<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة نجدورة - عيد الفطر</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3efe9;
            overflow-x: hidden;
        }
        
        .font-amiri {
            font-family: 'Amiri', serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .paper-texture {
            background: linear-gradient(135deg, #fffbf5 0%, #f5f0e8 100%);
            box-shadow: 0 25px 50px -12px rgba(93, 64, 55, 0.25);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #8D6E63 0%, #6D4C41 50%, #5D4037 100%);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(141, 110, 99, 0.3); }
            50% { box-shadow: 0 0 40px rgba(141, 110, 99, 0.6); }
        }

        .timer-card {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .coffee-steam {
            animation: steam 3s ease-in-out infinite;
        }

        @keyframes steam {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(-10px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        .section-divider {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
        }

        .section-divider::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8D6E63, transparent);
        }

        .section-divider span {
            background: #fffbf5;
            padding: 0 1rem;
            z-index: 1;
            color: #8D6E63;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Brand Assets
        const logoImage = "https://i.postimg.cc/k5skD0c9/Artboard-1.png";
        const backgroundImage = "https://i.postimg.cc/B6GG15WM/Asset-1.png";
        const qrImage = "https://i.postimg.cc/85VVrd8y/Asset_4.png";
        const envelopeImage = "https://image.qwenlm.ai/public_source/43583caf-c706-44a8-960f-5315ef07bba8/165999407-7a10-4c94-a7bc-b758cadbcfb7.png";

        // Countdown Timer Component
        function CountdownTimer() {
            const [timeLeft, setTimeLeft] = useState({
                days: 0,
                hours: 0,
                minutes: 0,
                seconds: 0
            });

            useEffect(() => {
                // Event date: March 20, 2026 at 8:00 PM
                const eventDate = new Date('2026-03-20T20:00:00').getTime();

                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = eventDate - now;

                    if (distance < 0) {
                        clearInterval(timer);
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                        return;
                    }

                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000)
                    });
                }, 1000);

                return () => clearInterval(timer);
            }, []);

            const TimeBox = ({ value, label }) => (
                <div className="flex flex-col items-center">
                    <div className="gold-gradient text-white w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center text-lg md:text-xl font-bold shadow-lg timer-card">
                        {String(value).padStart(2, '0')}
                    </div>
                    <span className="text-xs text-[#8D6E63] mt-1 font-medium">{label}</span>
                </div>
            );

            return (
                <div className="flex justify-center gap-2 md:gap-4 py-4">
                    <TimeBox value={timeLeft.days} label="يوم" />
                    <TimeBox value={timeLeft.hours} label="ساعة" />
                    <TimeBox value={timeLeft.minutes} label="دقيقة" />
                    <TimeBox value={timeLeft.seconds} label="ثانية" />
                </div>
            );
        }

        // Main App Component
        function App() {
            const [isOpen, setIsOpen] = useState(false);

            const handleOpen = () => {
                setIsOpen(true);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-2 md:p-4 relative overflow-hidden" 
                     style={{ 
                         backgroundImage: `url(${backgroundImage})`, 
                         backgroundSize: 'cover', 
                         backgroundPosition: 'center',
                         backgroundRepeat: 'no-repeat'
                     }}>
                    
                    {/* Overlay for better readability */}
                    <div className="absolute inset-0 bg-[#f3efe9]/90"></div>
                    
                    {/* Decorative Elements */}
                    <div className="absolute top-0 left-0 w-full h-full opacity-30 pointer-events-none overflow-hidden">
                        <div className="absolute top-10 left-10 w-40 h-40 bg-[#8D6E63] rounded-full blur-3xl"></div>
                        <div className="absolute bottom-10 right-10 w-60 h-60 bg-[#D7CCC8] rounded-full blur-3xl"></div>
                    </div>

                    <AnimatePresence>
                        {!isOpen ? (
                            /* ENVELOPE SCREEN */
                            <motion.div 
                                key="envelope"
                                className="cursor-pointer relative z-50"
                                onClick={handleOpen}
                                initial={{ scale: 0.8, opacity: 0 }}
                                animate={{ scale: 1, opacity: 1 }}
                                exit={{ scale: 1.5, opacity: 0, filter: "blur(10px)" }}
                                transition={{ duration: 0.8, ease: "easeInOut" }}
                            >
                                <div className="relative group">
                                    <motion.img 
                                        src={envelopeImage} 
                                        alt="Invitation Envelope" 
                                        className="w-[280px] md:w-[380px] h-auto drop-shadow-2xl"
                                        whileHover={{ scale: 1.05 }}
                                        transition={{ duration: 0.3 }}
                                    />
                                    <motion.div 
                                        className="absolute inset-0 flex items-center justify-center"
                                        initial={{ opacity: 0 }}
                                        animate={{ opacity: 1 }}
                                        transition={{ delay: 0.5, duration: 1 }}
                                    >
                                        <motion.div 
                                            className="bg-white/90 backdrop-blur-sm px-8 py-3 rounded-full text-[#5D4037] font-bold text-lg shadow-xl border-2 border-[#8D6E63]/30"
                                            whileHover={{ scale: 1.1 }}
                                        >
                                            ✨ اضغط لفتح الدعوة
                                        </motion.div>
                                    </motion.div>
                                    <motion.div 
                                        className="absolute -top-4 -right-4 text-4xl coffee-steam"
                                        animate={{ y: [-5, 5, -5] }}
                                        transition={{ duration: 3, repeat: Infinity }}
                                    >
                                        ☕
                                    </motion.div>
                                </div>
                            </motion.div>
                        ) : (
                            /* INVITATION CARD - SCROLLABLE */
                            <motion.div
                                key="card"
                                initial={{ y: 100, opacity: 0, scale: 0.9 }}
                                animate={{ y: 0, opacity: 1, scale: 1 }}
                                transition={{ duration: 0.8, type: "spring" }}
                                className="paper-texture w-full max-w-md md:max-w-lg h-[85vh] md:h-[800px] rounded-3xl overflow-hidden flex flex-col relative border-4 border-[#D7CCC8] shadow-2xl"
                            >
                                {/* Header with Logo */}
                                <div className="gold-gradient py-4 px-6 flex items-center justify-center relative">
                                    <img src={logoImage} alt="NAJDORA Logo" className="h-10 md:h-12 object-contain" />
                                    <div className="absolute bottom-1 text-white/70 text-xs font-amiri">قهوتها غير</div>
                                </div>

                                {/* Scrollable Content */}
                                <div className="flex-1 overflow-y-auto scrollbar-hide p-6">
                                    
                                    {/* Section 1: Welcome */}
                                    <motion.section 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.2 }}
                                        className="space-y-4"
                                    >
                                        {/* Welcome Message */}
                                        <div className="text-center space-y-3 pt-2">
                                            <motion.div 
                                                initial={{ scale: 0 }}
                                                animate={{ scale: 1 }}
                                                transition={{ delay: 0.3, type: "spring" }}
                                            >
                                                <span className="text-4xl">🤍</span>
                                            </motion.div>
                                            <h2 className="text-xl font-bold text-[#5D4037]">حيّاكم الله</h2>
                                            <p className="text-[#8D6E63] text-sm">والعيد بيكون عيدين معنا</p>
                                            
                                            {/* Eid Badge */}
                                            <div className="gold-gradient text-white inline-block px-6 py-3 rounded-2xl shadow-lg mt-2">
                                                <p className="font-bold font-amiri text-lg">عيد الفطر</p>
                                                <p className="text-xs opacity-90">مع نجدورة ☕️</p>
                                            </div>
                                            
                                            <p className="text-xs text-[#8D6E63] mt-2">دعوة خاصة من نجدورة</p>
                                        </div>

                                        {/* Countdown Timer */}
                                        <div className="bg-white rounded-2xl p-4 shadow-lg border border-[#D7CCC8]">
                                            <h3 className="text-center text-[#5D4037] font-bold text-sm mb-2">⏳ العد التنازلي للعيد</h3>
                                            <CountdownTimer />
                                            <p className="text-center text-xs text-[#8D6E63] mt-2">٢٠ مارس ٢٠٢٦ | ٨ مساءً</p>
                                        </div>

                                        {/* Invitation Note */}
                                        <div className="bg-[#EFEBE9] p-4 rounded-xl border border-[#D7CCC8] text-center">
                                            <p className="text-[#5D4037] text-sm leading-relaxed">
                                                يسعدنا حضورك ومشاركتنا العيد في نجدورة<br/>
                                                <span className="font-bold text-[#8D6E63]">والدعوة لك + شخص عزيز عليك 🫂</span>
                                            </p>
                                        </div>
                                    </motion.section>

                                    {/* Divider */}
                                    <div className="section-divider">
                                        <span>☕</span>
                                    </div>

                                    {/* Section 2: Hospitality Details */}
                                    <motion.section 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.4 }}
                                        className="space-y-4"
                                    >
                                        <h2 className="text-lg font-bold text-[#5D4037] text-center flex items-center justify-center gap-2">
                                            <span>🎁</span> تفاصيل الضيافة
                                        </h2>

                                        {/* Hospitality Cards */}
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="gold-gradient text-white p-4 rounded-xl shadow-lg text-center">
                                                <span className="text-2xl mb-1 block">☕</span>
                                                <p className="font-bold text-xs">مشروبين</p>
                                                <p className="text-xs opacity-80">من اختياركم</p>
                                            </div>
                                            <div className="bg-gradient-to-br from-[#D7CCC8] to-[#BCAAA4] text-[#5D4037] p-4 rounded-xl shadow-lg text-center">
                                                <span className="text-2xl mb-1 block">🧁</span>
                                                <p className="font-bold text-xs">حلا مميز</p>
                                                <p className="text-xs opacity-80">حسب الترند</p>
                                            </div>
                                        </div>

                                        {/* New Items */}
                                        <div className="bg-white rounded-xl p-4 shadow-md border border-[#D7CCC8]">
                                            <h3 className="font-bold text-[#5D4037] mb-3 text-sm flex items-center gap-2">
                                                <span>✨</span> الأصناف الجديدة
                                            </h3>
                                            <div className="space-y-2">
                                                <div className="flex items-center gap-3 bg-[#F8E8E8] p-2 rounded-lg">
                                                    <span className="text-xl">🍓</span>
                                                    <div>
                                                        <p className="font-bold text-[#5D4037] text-xs">ماتشا ستروبري</p>
                                                        <p className="text-xs text-[#8D6E63]">مشروب جديد</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3 bg-[#FFF8E1] p-2 rounded-lg">
                                                    <span className="text-xl">🍨</span>
                                                    <div>
                                                        <p className="font-bold text-[#5D4037] text-xs">حلا سكوب نجدورة</p>
                                                        <p className="text-xs text-[#8D6E63]">خاص بنا</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Date & Time */}
                                        <div className="space-y-2">
                                            <div className="gold-gradient text-white p-3 rounded-xl shadow-lg flex items-center justify-between">
                                                <div>
                                                    <p className="text-xs opacity-80">الأيام</p>
                                                    <p className="font-bold text-sm">الخميس & الجمعة | ٢٠ + ٢١ مارس</p>
                                                </div>
                                                <span className="text-2xl">📅</span>
                                            </div>
                                            
                                            <div className="bg-[#8D6E63] text-white p-3 rounded-xl shadow-lg flex items-center justify-between">
                                                <div>
                                                    <p className="text-xs opacity-80">الوقت</p>
                                                    <p className="font-bold text-sm">8 مساءً - 1 فجرًا</p>
                                                </div>
                                                <span className="text-2xl">🕔</span>
                                            </div>
                                        </div>

                                        {/* Activities */}
                                        <div className="bg-[#EFEBE9] p-3 rounded-xl border border-[#D7CCC8]">
                                            <h3 className="font-bold text-[#5D4037] mb-2 text-sm">🎡 الفعاليات</h3>
                                            <div className="grid grid-cols-2 gap-2 text-xs text-[#5D4037]">
                                                <div className="flex items-center gap-2"><span>🎡</span> عجلة الحظ</div>
                                                <div className="flex items-center gap-2"><span>🎁</span> توزيعات العيد</div>
                                                <div className="flex items-center gap-2"><span>🪑</span> جلسات داخلية</div>
                                                <div className="flex items-center gap-2"><span>🌴</span> جلسات خارجية</div>
                                            </div>
                                        </div>
                                    </motion.section>

                                    {/* Divider */}
                                    <div className="section-divider">
                                        <span>📍</span>
                                    </div>

                                    {/* Section 3: Location */}
                                    <motion.section 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.6 }}
                                        className="space-y-4"
                                    >
                                        <h2 className="text-lg font-bold text-[#5D4037] text-center">📍 موقعنا</h2>
                                        
                                        {/* Location Info */}
                                        <div className="bg-[#EFEBE9] rounded-xl p-4 border border-[#D7CCC8] text-center">
                                            <p className="text-[#5D4037] font-medium text-sm">
                                                العليا - طريق الملك فهد<br/>
                                                <span className="text-[#8D6E63]">مقابل برج المملكة</span>
                                            </p>
                                            
                                            <a 
                                                href="https://maps.app.goo.gl/rFCDhPm6cTRUb9uy7?g_st=ic" 
                                                target="_blank"
                                                className="block w-full gold-gradient text-white font-bold py-3 rounded-xl shadow-lg text-center hover:opacity-90 transition-opacity mt-3 text-sm flex items-center justify-center gap-2"
                                            >
                                                <span>🗺️</span>
                                                <span>افتح في خرائط جوجل</span>
                                            </a>
                                        </div>

                                        {/* QR Code */}
                                        <div className="bg-white rounded-xl p-4 shadow-lg border border-[#D7CCC8] text-center">
                                            <h3 className="font-bold text-[#5D4037] mb-3 text-sm">امسح الكود للوصول للموقع</h3>
                                            <div className="inline-block p-2 bg-white rounded-xl shadow-md border-2 border-[#8D6E63]">
                                                <img src={qrImage} alt="QR Code" className="w-28 h-28 object-contain" />
                                            </div>
                                        </div>

                                        {/* Landmark */}
                                        <div className="bg-[#5D4037] text-white p-3 rounded-xl text-center">
                                            <p className="text-xs">🏢 landmark: برج المملكة</p>
                                            <p className="text-xs opacity-80 mt-1">أيقونة الرياض تنتظركم</p>
                                        </div>
                                    </motion.section>

                                    {/* Divider */}
                                    <div className="section-divider">
                                        <span>📝</span>
                                    </div>

                                    {/* Section 4: Conditions */}
                                    <motion.section 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.8 }}
                                        className="space-y-4"
                                    >
                                        <h2 className="text-lg font-bold text-[#5D4037] text-center">الشروط والتعليمات</h2>

                                        {/* Conditions */}
                                        <div className="bg-red-50 rounded-xl p-3 border-2 border-red-200">
                                            <h3 className="font-bold text-red-800 mb-2 text-sm flex items-center gap-2">
                                                <span>🟥</span> الشروط المطلوبة
                                            </h3>
                                            <div className="space-y-2">
                                                {[
                                                    { icon: '👤', text: 'حساب متفاعل' },
                                                    { icon: '📱', text: 'تصوير مقطع تيك توك مع منشن' },
                                                    { icon: '⭐', text: 'كتابة تعليق في قوقل ماب' },
                                                    { icon: '🏷️', text: 'منشن حسابنا' }
                                                ].map((item, index) => (
                                                    <div key={index} className="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm">
                                                        <span className="text-lg">{item.icon}</span>
                                                        <span className="text-xs text-[#5D4037]">{item.text}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Instructions */}
                                        <div className="bg-[#EFEBE9] rounded-xl p-3 border border-[#D7CCC8]">
                                            <h3 className="font-bold text-[#5D4037] mb-2 text-sm flex items-center gap-2">
                                                <span>📸</span> نقاط التصوير
                                            </h3>
                                            <div className="space-y-1 text-xs text-[#5D4037]">
                                                {[
                                                    'الفعالية كاملة وعجلة الحظ',
                                                    'توزيعات العيد',
                                                    'الأصناف الجديدة (ماتشا ستروبري، حلا سكوب نجدورة)',
                                                    'الجلسات الداخلية والخارجية',
                                                    'الإطلالة على برج المملكة'
                                                ].map((item, index) => (
                                                    <div key={index} className="flex items-start gap-2">
                                                        <span className="text-[#8D6E63]">•</span>
                                                        <span>{item}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Social Media */}
                                        <div className="gold-gradient text-white p-3 rounded-xl text-center">
                                            <p className="font-bold text-xs mb-1">لا تنسون المنشن!</p>
                                            <p className="text-xs opacity-90">@najdora</p>
                                        </div>
                                    </motion.section>
                                </div>

                                {/* Footer */}
                                <div className="gold-gradient py-3 px-6 text-center flex-shrink-0">
                                    <p className="text-white font-amiri text-xs">بانتظاركم نحيّيكم على طريقتنا 🤎☕️</p>
                                    <p className="text-white/70 text-xs mt-1">نجدورة… قهوتها غير</p>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
